<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Car battery illustration">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <radialGradient id="postGrad" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Soft ground shadow -->
  <ellipse cx="200" cy="338" rx="130" ry="10" fill="#0f172a" opacity="0.18"/>

  <g filter="url(#shadow)">
    <!-- Terminal bases -->
    <rect x="92" y="92" width="58" height="22" rx="3" fill="url(#topGrad)"/>
    <rect x="250" y="92" width="58" height="22" rx="3" fill="url(#topGrad)"/>

    <!-- Positive post (red cap) -->
    <circle cx="121" cy="92" r="16" fill="url(#postGrad)"/>
    <circle cx="121" cy="92" r="11" fill="#dc2626"/>
    <text x="121" y="97" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="700">+</text>

    <!-- Negative post (dark cap) -->
    <circle cx="279" cy="92" r="16" fill="url(#postGrad)"/>
    <circle cx="279" cy="92" r="11" fill="#111827"/>
    <text x="279" y="98" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="700">−</text>

    <!-- Battery top -->
    <rect x="70" y="110" width="260" height="30" rx="6" fill="url(#topGrad)"/>

    <!-- Battery body -->
    <rect x="70" y="135" width="260" height="180" rx="10" fill="url(#bodyGrad)"/>

    <!-- Cell vents on top -->
    <g fill="#0b1220">
      <circle cx="115" cy="125" r="3"/>
      <circle cx="155" cy="125" r="3"/>
      <circle cx="195" cy="125" r="3"/>
      <circle cx="235" cy="125" r="3"/>
      <circle cx="275" cy="125" r="3"/>
    </g>

    <!-- Front label -->
    <rect x="92" y="170" width="216" height="120" rx="6" fill="url(#labelGrad)" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Brand strip -->
    <rect x="92" y="170" width="216" height="28" rx="6" fill="#0ea5e9"/>
    <rect x="92" y="190" width="216" height="8" fill="#0ea5e9"/>
    <text x="200" y="189" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2">POWER CELL</text>

    <!-- Specs -->
    <text x="200" y="232" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="32" font-weight="800">12V</text>
    <text x="200" y="260" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="14" font-weight="600">MAINTENANCE FREE</text>
    <text x="200" y="280" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11">High cranking power · Long life</text>
  </g>
</svg>
